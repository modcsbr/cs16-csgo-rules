// ==========================================
// CS 1.6 - Competitivo estilo CS:GO
// Jogador humano no CT
// 5 CT x 5 TR
// ==========================================

// Regras principais
sv_cheats 0
sv_alltalk 0

mp_autoteambalance 0
mp_limitteams 0

mp_friendlyfire 1
mp_tkpunish 0
mp_autokick 0

// Tempos estilo competitivo clássico do CS:GO
mp_freezetime 15
mp_roundtime 1.92
mp_buytime 0.3333
mp_c4timer 40

// Economia e duração
mp_startmoney 800
mp_timelimit 0
mp_maxrounds 30
mp_winlimit 16

// Câmera após morrer
mp_forcecamera 2
mp_forcechasecam 2
mp_fadetoblack 0

// ==========================================
// YaPB - Você joga de CT
// 4 bots CT + você contra 5 bots TR
// ==========================================

yb kickall instant

// Não remover bot quando o jogador entrar
yb_autovacate 0
yb_join_after_player 1

// Dificuldade:
// 2 = normal
// 3 = profissional
// 4 = extremamente difícil
yb_difficulty 3

// Cinco bots CT
yb add 3 0 2 0
yb add 3 0 2 0
yb add 3 0 2 0
yb add 3 0 2 0
yb add 3 0 2 0

// Quatro bots Terroristas
yb add 3 0 1 0
yb add 3 0 1 0
yb add 3 0 1 0
yb add 3 0 1 0

// Pistol round
sv_restart 3

echo "YaPB: 5 CT x 5 TR - pistol round"